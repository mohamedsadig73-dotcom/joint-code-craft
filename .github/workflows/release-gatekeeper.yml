name: Release Gatekeeper

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  security-quality-check:
    runs-on: ubuntu-latest
    name: Security & Quality Gate

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: 🔒 Verify lockfile integrity
        run: |
          SIZE=$(wc -c < package-lock.json)
          echo "package-lock.json size: ${SIZE} bytes"
          if [ "$SIZE" -lt 1000 ]; then
            echo "❌ package-lock.json is empty/corrupted (${SIZE} bytes)."
            echo "   Regenerate locally with: rm -rf node_modules package-lock.json && npm install --legacy-peer-deps"
            exit 1
          fi
          echo "✅ Lockfile looks valid"

      - name: 📦 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🚫 Block Store Publishing
        run: |
          echo "🔒 Checking for publishing attempts..."
          if grep -rE "(app-store|play-store|fastlane deploy|upload.*store)" --include="*.yml" --include="*.yaml" .github/ 2>/dev/null; then
            echo "❌ Store publishing is blocked for private app"
            exit 1
          fi
          echo "✅ No store publishing detected"

      - name: 🔍 Run ESLint
        run: npm run lint
        continue-on-error: false

      - name: 📝 TypeScript Type Check
        run: npx tsc --noEmit
        continue-on-error: false

      - name: 🛡️ Security Audit (High/Critical)
        run: |
          echo "🔒 Running security audit..."
          npm audit --audit-level=high --omit=dev || {
            echo "❌ Critical/High vulnerabilities found!"
            echo "Please fix security issues before merging."
            exit 1
          }
          echo "✅ No critical security issues found"

      - name: 🏗️ Build Check
        run: npm run build
        env:
          CI: true

      - name: 📱 PWA Validation
        run: |
          echo "🔍 Validating PWA configuration..."
          if [ -f "public/pwa-icon-192.png" ] && [ -f "public/pwa-icon-512.png" ]; then
            echo "✅ PWA icons present"
          else
            echo "⚠️ PWA icons missing"
          fi
          if grep -q "VitePWA" vite.config.ts; then
            echo "✅ PWA plugin configured"
          else
            echo "⚠️ PWA plugin not found"
          fi

      - name: 📋 UX Checklist Gate
        run: |
          echo "📋 UX Checklist Status"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          if [ -f "MOBILE_CHECKLIST.md" ]; then
            echo "✅ Mobile checklist exists"
          else
            echo "⚠️ Mobile checklist not found"
          fi
          if [ -f "UX_AUDIT_REPORT.md" ]; then
            echo "✅ UX audit report exists"
          else
            echo "⚠️ UX audit report not found"
          fi
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "⚠️ Manual UX verification required before release"

      - name: ✅ All Checks Passed
        run: |
          echo "🎉 All quality gates passed!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Lint: OK"
          echo "✅ TypeScript: OK"
          echo "✅ Security: OK"
          echo "✅ Build: OK"
          echo "✅ PWA: Validated"
          echo "✅ Store Block: Active"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "🚀 Ready for private deployment"
          echo "📱 Install via: Add to Home Screen"
          echo "🚫 NOT for App Store / Play Store"
