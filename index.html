  <body>
    <!-- Force clear old caches on first load -->
    <script src="/sw-cleanup.js"></script>
    <script>
      // Version check on load - v4.0.0 AGGRESSIVE CACHE CLEAR
      (function() {
        var currentVersion = '4.0.0-20260209160000';
        var versionKey = 'dts-html-version-v10';
        var storedVersion = localStorage.getItem(versionKey);
        
        console.log('[DTS HTML v4.0.0] Current:', currentVersion, 'Stored:', storedVersion);
        
        // AGGRESSIVE: Always try to activate waiting SW
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            registrations.forEach(function(reg) {
              if (reg.waiting) {
                console.log('[DTS HTML] Activating waiting SW');
                reg.waiting.postMessage({ type: 'SKIP_WAITING' });
              }
            });
          });
        }
        
        if (storedVersion !== currentVersion) {
          console.log('[DTS HTML] VERSION MISMATCH! Clearing everything...');
          
          // Clear ALL dts keys
          var keysToRemove = [];
          for (var i = 0; i < localStorage.length; i++) {
            var key = localStorage.key(i);
            if (key && (key.startsWith('dts-') || key.includes('version'))) {
              keysToRemove.push(key);
            }
          }
          keysToRemove.forEach(function(k) { localStorage.removeItem(k); });
          
          // Set new version
          localStorage.setItem(versionKey, currentVersion);
          
          // Clear all caches
          if ('caches' in window) {
            caches.keys().then(function(names) {
              names.forEach(function(name) { caches.delete(name); });
              console.log('[DTS HTML] Cleared', names.length, 'caches');
            });
          }
          
          // Unregister service workers
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(regs) {
              regs.forEach(function(r) { r.unregister(); });
              console.log('[DTS HTML] Unregistered', regs.length, 'service workers');
            });
          }
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
